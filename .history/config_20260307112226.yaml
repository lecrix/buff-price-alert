# ------ 监控时段（24小时制）------
schedule:
  start_hour: 9    # 开始时间（整点）
  end_hour: 24     # 结束时间（24 表示午夜 0 点）

# ------ 请求设置 ------
# 每个饰品查询之间的间隔秒数
# 例：5 个饰品，间隔 30 秒 → 每个饰品约 2.5 分钟查一次
request_interval: 30

# ------ 价格判断 ------
# 最低价低于第二低价此百分比时触发通知
price_threshold_percent: 10

# 同一饰品的通知冷却时间（分钟），避免重复推送
notify_cooldown_minutes: 30

# ------ 监控饰品列表 ------
# goods_id：在 buff 饰品页面 URL 中找到，如 https://buff.163.com/goods/34474
# min_paintwear / max_paintwear：磨损值区间
