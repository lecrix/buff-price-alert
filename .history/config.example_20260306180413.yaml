# ============================================================
# Buff 饰品价格监控 — 配置文件模板
# 复制此文件为 config.yaml，然后填入你的真实信息
# ============================================================

# ------ Buff Cookie ------
# 从浏览器 F12 开发者工具中获取，详见 README.md
buff_cookie: "在这里粘贴你的Buff Cookie"

# ------ Server酱 SendKey ------
# 注册 https://sct.ftqq.com 后获取，详见 README.md
serverchan_key: "在这里粘贴你的SendKey"

# ------ 监控时段（24小时制）------
schedule:
  start_hour: 9    # 开始时间（整点）
  end_hour: 24     # 结束时间（24 表示午夜 0 点）

# ------ 请求设置 ------
# 每个饰品查询之间的间隔秒数
# 例：5 个饰品，间隔 30 秒 → 每个饰品约 2.5 分钟查一次
request_interval: 30

# ------ 价格判断 ------
# 最低价低于第二低价此百分比时触发通知
price_threshold_percent: 10

# 同一饰品的通知冷却时间（分钟），避免重复推送
notify_cooldown_minutes: 30

# ------ 监控饰品列表 ------
# goods_id：在 buff 饰品页面 URL 中找到，如 https://buff.163.com/goods/34474
# min_paintwear / max_paintwear：磨损值区间
items:
  - name: "AK-47 | 火蛇 (久经沙场)"
    goods_id: 34474
    min_paintwear: 0.15
    max_paintwear: 0.18

  - name: "AWP | 二西莫夫 (久经沙场)"
    goods_id: 33891
    min_paintwear: 0.18
    max_paintwear: 0.25

# 添加更多饰品，格式同上：
#  - name: "饰品名称"
#    goods_id: 12345
#    min_paintwear: 0.00
#    max_paintwear: 0.07
