# ============================================================
# Buff 饰品价格监控 — 配置文件模板
# 复制此文件为 config.yaml，然后填入你的真实信息
# ============================================================

# ------ Buff Cookie ------
# 从浏览器 F12 开发者工具中获取，详见 README.md
buff_cookie: "在这里粘贴你的Buff Cookie"

# ------ Server酱 SendKey ------
# 注册 https://sct.ftqq.com 后获取，详见 README.md
serverchan_key: "在这里粘贴你的SendKey"

# ------ 监控时段（24小时制）------
schedule:
  start_hour: 9    # 开始时间（整点）
  end_hour: 24     # 结束时间（24 表示午夜 0 点）

# ------ 请求设置 ------
# 每个饰品查询之间的间隔秒数
# 例：8 个条目，间隔 7 秒 → 每个条目约 56 秒查一次
request_interval: 7

# ------ 价格判断 ------
# 最低价低于第二低价此百分比时触发通知
price_threshold_percent: 2

# 同一饰品的通知冷却时间（分钟），避免重复推送
notify_cooldown_minutes: 15

# ------ 监控饰品列表 ------
# goods_id：在 buff 饰品页面 URL 中找到，如 https://buff.163.com/goods/34474
# min_paintwear / max_paintwear：磨损值区间
items:
# AWP | 克拉考 (久经沙场 0.15-0.18)
  - name: "AWP | 克拉考 (久经沙场 0.15-0.18)"
    goods_id: 968298
    min_paintwear: 0.15
    max_paintwear: 0.18

# AWP | 克拉考 (久经沙场 0.18-0.21)
  - name: "AWP | 克拉考 (久经沙场 0.18-0.21)"
    goods_id: 968298
    min_paintwear: 0.18
    max_paintwear: 0.21

# AWP | 克拉考 (久经沙场 0.21-0.24)
  - name: "AWP | 克拉考 (久经沙场 0.21-0.24)"
    goods_id: 968298
    min_paintwear: 0.21
    max_paintwear: 0.24

# AWP | 克拉考 (久经沙场 0.24-0.27)
  - name: "AWP | 克拉考 (久经沙场 0.24-0.27)"
    goods_id: 968298
    min_paintwear: 0.24
    max_paintwear: 0.27

